<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmers — KrushiConnect Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <style>
    .admin-shell { display:flex; min-height:100vh; background:#F5F7F2; }
    .admin-sidebar { width:220px; min-height:100vh; background:#1A3C2E; display:flex; flex-direction:column; padding:1.5rem 0; position:fixed; top:0; left:0; z-index:100; }
    .admin-sidebar-logo { display:flex; align-items:center; gap:0.6rem; padding:0 1.25rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:1rem; text-decoration:none; }
    .admin-sidebar-logo span { font-family:'Playfair Display',serif; font-size:1rem; color:white; }
    .admin-nav-section { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.4); padding:1rem 1.25rem 0.4rem; }
    .admin-nav-link { display:flex; align-items:center; gap:0.6rem; padding:0.6rem 1.25rem; color:rgba(255,255,255,0.75); text-decoration:none; font-size:0.875rem; font-weight:500; transition:all 0.2s; border-left:3px solid transparent; }
    .admin-nav-link:hover, .admin-nav-link.active { background:rgba(255,255,255,0.08); color:white; border-left-color:#C8A96E; }
    .nav-icon { font-size:1rem; width:20px; text-align:center; }
    .admin-sidebar-footer { margin-top:auto; padding:1rem 1.25rem; border-top:1px solid rgba(255,255,255,0.1); }
    .admin-main { margin-left:220px; flex:1; display:flex; flex-direction:column; }
    .admin-topbar { background:white; padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #E5E7EB; position:sticky; top:0; z-index:50; }
    .admin-topbar-title { font-family:'Playfair Display',serif; font-size:1.2rem; color:#1A3C2E; font-weight:700; }
    .admin-topbar-user { display:flex; align-items:center; gap:0.6rem; font-size:0.875rem; color:#555; }
    .admin-user-avatar { width:32px; height:32px; background:#1A3C2E; color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.875rem; }
    .admin-content { padding:2rem; }
    .admin-table-wrap { background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow:hidden; }
    .admin-table-header { display:flex; align-items:center; justify-content:space-between; padding:1.25rem 1.5rem; border-bottom:1px solid #F0F0F0; flex-wrap:wrap; gap:1rem; }
    .admin-table-title { font-weight:700; color:#1A3C2E; font-size:0.95rem; }
    .admin-table { width:100%; border-collapse:collapse; font-size:0.875rem; }
    .admin-table th { background:#F9FAFB; padding:0.75rem 1rem; text-align:left; font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:#6B7280; border-bottom:1px solid #E5E7EB; }
    .admin-table td { padding:0.85rem 1rem; border-bottom:1px solid #F3F4F6; color:#374151; vertical-align:middle; }
    .admin-table tr:last-child td { border-bottom:none; }
    .admin-table tr:hover td { background:#FAFAFA; }
    .search-input { padding:0.5rem 1rem; border:1.5px solid #D4D4D4; border-radius:8px; font-size:0.875rem; font-family:inherit; outline:none; width:220px; }
    .search-input:focus { border-color:#2E6B4F; }
    .farmer-avatar { width:34px; height:34px; border-radius:50%; background:#1A3C2E; color:white; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; flex-shrink:0; }
    .btn-action { display:inline-block; padding:0.3rem 0.75rem; border-radius:6px; font-size:0.75rem; font-weight:600; cursor:pointer; border:none; font-family:inherit; text-decoration:none; }
    .btn-delete { background:#FFEBEE; color:#C62828; }
    .btn-delete:hover { background:#FFCDD2; }
    .btn-wa { background:#DCFCE7; color:#166534; text-decoration:none; }
    .btn-wa:hover { background:#BBF7D0; }
  </style>
</head>
<body class="page-body">

<!-- Access Denied -->
<div class="empty-state" id="accessDenied" style="display:none;padding-top:5rem;">
  <div class="empty-state-icon">🔒</div>
  <h3>Access Denied</h3>
  <p>You must be an admin to view this page.</p>
  <a href="../login.html" class="btn btn-primary">Login as Admin</a>
</div>

<!-- Admin Shell -->
<div class="admin-shell" id="adminShell" style="display:none;">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <a href="dashboard.html" class="admin-sidebar-logo">
      <span style="font-size:1.4rem;">🌾</span>
      <span>KrushiConnect</span>
    </a>
    <div class="admin-nav-section">Products</div>
    <a href="dashboard.html"   class="admin-nav-link"><span class="nav-icon">📊</span> Dashboard</a>
    <a href="add-product.html" class="admin-nav-link"><span class="nav-icon">➕</span> Add Product</a>
    <div class="admin-nav-section">Users</div>
    <a href="farmers.html"   class="admin-nav-link active"><span class="nav-icon">👨‍🌾</span> Farmers</a>
    <a href="inquiries.html" class="admin-nav-link"><span class="nav-icon">✉</span> Inquiries</a>
    <div class="admin-nav-section">Site</div>
    <a href="../../index.html" class="admin-nav-link"><span class="nav-icon">🏠</span> View Website</a>
    <div class="admin-sidebar-footer">
      <div id="sidebarName" style="color:rgba(255,255,255,0.7);margin-bottom:0.4rem;font-size:0.85rem;"></div>
      <button onclick="logout()" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:none;border-radius:6px;padding:0.4rem 0.75rem;font-size:0.75rem;cursor:pointer;font-family:inherit;">Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <span class="admin-topbar-title">Registered Farmers</span>
      <div class="admin-topbar-user">
        <div class="admin-user-avatar" id="topbarInitial">A</div>
        <span id="topbarName">Admin</span>
      </div>
    </div>

    <div class="admin-content">
      <div class="admin-table-wrap">
        <div class="admin-table-header">
          <span class="admin-table-title">All Registered Farmers</span>
          <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
            <input class="search-input" type="text" id="searchInput"
              placeholder="Search by name or village…"
              oninput="filterFarmers()" />
            <span id="farmerCount"
              style="font-size:0.8rem;color:#737373;white-space:nowrap;"></span>
          </div>
        </div>

        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Farmer</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Village</th>
                <th>Registered On</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="farmersTableBody">
              <tr>
                <td colspan="7"
                    style="padding:2rem;text-align:center;color:#737373;">
                  Loading farmers...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../../js/config.js"></script>
<script>
  const API   = typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : 'http://localhost:5000/api';
  const token = localStorage.getItem('kc_token');
  const user  = JSON.parse(localStorage.getItem('kc_user') || 'null');
  let allFarmers = [];

  function isAdmin(u) {
    return u && (u.role === 'owner_admin' || u.role === 'demo_admin');
  }

  function logout() {
    localStorage.removeItem('kc_token');
    localStorage.removeItem('kc_user');
    window.location.href = '../login.html';
  }

  // ─── Init ─────────────────────────────────────────────────
  async function init() {
    if (!token || !isAdmin(user)) {
      document.getElementById('accessDenied').style.display = 'block';
      return;
    }
    document.getElementById('adminShell').style.display  = 'flex';
    document.getElementById('sidebarName').textContent   = user.name || 'Admin';
    document.getElementById('topbarName').textContent    = user.name || 'Admin';
    document.getElementById('topbarInitial').textContent = (user.name || 'A')[0].toUpperCase();
    await loadFarmers();
  }

  // ─── Load Farmers ─────────────────────────────────────────
  async function loadFarmers() {
    try {
      const res  = await fetch(`${API}/farmers`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      allFarmers = data.farmers || data.data || [];
      renderFarmers(allFarmers);
    } catch (err) {
      console.warn('Backend offline, showing demo data:', err.message);
      allFarmers = demoFarmers();
      renderFarmers(allFarmers);
    }
  }

  // ─── Search / Filter ──────────────────────────────────────
  function filterFarmers() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = allFarmers.filter(f =>
      (f.name    || '').toLowerCase().includes(q) ||
      (f.village || '').toLowerCase().includes(q) ||
      (f.email   || '').toLowerCase().includes(q)
    );
    renderFarmers(filtered);
  }

  // ─── Render Table ─────────────────────────────────────────
  function renderFarmers(list) {
    document.getElementById('farmerCount').textContent =
      `${list.length} farmer${list.length !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('farmersTableBody');

    if (!list.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="7"
              style="padding:2rem;text-align:center;color:#737373;">
            No farmers found.
          </td>
        </tr>`;
      return;
    }

    tbody.innerHTML = list.map((f, i) => {
      const name    = f.name    || '—';
      const email   = f.email   || '—';
      const phone   = f.phone   || '—';
      const village = f.village || '—';
      const date    = f.createdAt
        ? new Date(f.createdAt).toLocaleDateString('en-IN', {
            day: 'numeric', month: 'short', year: 'numeric'
          })
        : '—';

      return `
        <tr>
          <td style="color:#9CA3AF;">${i + 1}</td>
          <td>
            <div style="display:flex;align-items:center;gap:0.6rem;">
              <div class="farmer-avatar">${name[0].toUpperCase()}</div>
              <strong>${name}</strong>
            </div>
          </td>
          <td style="color:#555;">${email}</td>
          <td>
            ${phone !== '—'
              ? `<a href="tel:${phone}" style="color:#2E7D32;text-decoration:none;">${phone}</a>`
              : '—'}
          </td>
          <td>${village}</td>
          <td style="color:#9CA3AF;">${date}</td>
          <td style="white-space:nowrap;">
            ${phone !== '—'
              ? `<a href="https://wa.me/91${phone}" target="_blank" class="btn-action btn-wa">💬 WhatsApp</a>`
              : ''}
            <button class="btn-action btn-delete"
              onclick="deleteFarmer('${f._id}', this)"
              style="margin-left:0.25rem;">
              🗑 Delete
            </button>
          </td>
        </tr>`;
    }).join('');
  }

  // ─── Delete Farmer ────────────────────────────────────────
  async function deleteFarmer(id, btn) {
    if (!confirm('Delete this farmer account? This cannot be undone.')) return;
    try {
      const res = await fetch(`${API}/farmers/${id}`, {
        method : 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      });
      if (res.ok) {
        allFarmers = allFarmers.filter(f => f._id !== id);
        btn.closest('tr').remove();
        document.getElementById('farmerCount').textContent =
          `${allFarmers.length} farmer${allFarmers.length !== 1 ? 's' : ''}`;
      } else {
        const data = await res.json();
        alert(data.message || 'Could not delete farmer.');
      }
    } catch {
      alert('Server not reachable.');
    }
  }

  // ─── Demo Data ────────────────────────────────────────────
  function demoFarmers() {
    return [
      { _id:'1', name:'Ramesh Patil',  email:'ramesh@gmail.com',  phone:'9876543210', village:'Pimpalgaon', createdAt: new Date(Date.now() - 86400000 * 5) },
      { _id:'2', name:'Suresh Shinde', email:'suresh@gmail.com',  phone:'9765432109', village:'Daund',      createdAt: new Date(Date.now() - 86400000 * 3) },
      { _id:'3', name:'Anita More',    email:'anita@gmail.com',   phone:'9654321098', village:'Yevat',      createdAt: new Date(Date.now() - 86400000 * 1) },
    ];
  }

  // ─── Run ──────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
