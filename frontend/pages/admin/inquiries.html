<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inquiries — KrushiConnect Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <style>
    .filter-tabs {
      display: flex;
      gap: 0.4rem;
      background: var(--gray-100);
      border-radius: 50px;
      padding: 4px;
    }
    .filter-tab {
      padding: 0.4rem 1rem;
      border-radius: 50px;
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      background: transparent;
      color: var(--gray-500);
      transition: all 0.2s;
    }
    .filter-tab.active {
      background: var(--green-deep);
      color: white;
    }
    .inq-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(26,60,46,0.07);
      margin-bottom: 1rem;
      border-left: 4px solid var(--gray-300);
      transition: border-color 0.2s;
    }
    .inq-card.pending    { border-left-color: #F59E0B; }
    .inq-card.responded  { border-left-color: var(--green-fresh); }
    .inq-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .inq-farmer-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    .inq-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--green-deep);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 700; flex-shrink: 0;
    }
    .inq-farmer-name { font-weight: 600; font-size: 0.9rem; color: var(--green-deep); }
    .inq-farmer-contact { font-size: 0.75rem; color: var(--gray-500); margin-top: 1px; }
    .inq-product-badge {
      background: var(--cream);
      color: var(--green-deep);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      border: 1px solid var(--green-light);
    }
    .inq-message {
      font-size: 0.9rem;
      color: var(--gray-700);
      line-height: 1.65;
      background: var(--cream);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.85rem;
    }
    .inq-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .inq-date { font-size: 0.75rem; color: var(--gray-500); }
    .inq-actions { display: flex; gap: 0.5rem; align-items: center; }
    .btn-respond {
      font-size: 0.78rem; font-weight: 600;
      padding: 0.38rem 0.85rem;
      border-radius: 6px; border: none; cursor: pointer;
      background: #DCFCE7; color: #166534;
      font-family: var(--font-body);
      transition: background 0.2s;
    }
    .btn-respond:hover { background: #BBF7D0; }
    .btn-respond.undo  { background: #FEF3C7; color: #92400E; }
    .btn-respond.undo:hover { background: #FDE68A; }
    .wa-reply {
      font-size: 0.78rem; font-weight: 600;
      padding: 0.38rem 0.85rem;
      border-radius: 6px; border: none; cursor: pointer;
      background: #DCFCE7; color: #16a34a;
      text-decoration: none;
      font-family: var(--font-body);
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .wa-reply:hover { background: #BBF7D0; color: #15803d; }
    .empty-inq {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--gray-500);
    }
    .empty-inq-icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body class="page-body">

<!-- Access denied -->
<div class="empty-state" id="accessDenied" style="display:none;padding-top:5rem;">
  <div class="empty-state-icon">🔐</div>
  <h3>Admin Access Required</h3>
  <a href="../login.html" class="btn btn-primary">Login</a>
</div>

<div class="admin-shell" id="adminShell" style="display:none;">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <a href="dashboard.html" class="admin-sidebar-logo">
      <div class="admin-sidebar-logo-mark">🌾</div>
      <div class="admin-sidebar-logo-text">
        <span class="admin-sidebar-logo-name">KrushiConnect</span>
        <span class="admin-sidebar-logo-role">Admin Panel</span>
      </div>
    </a>
    <nav class="admin-nav">
      <div class="admin-nav-section">Main</div>
      <a href="dashboard.html"   class="admin-nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="add-product.html" class="admin-nav-link"><span class="nav-icon">➕</span> Add Product</a>
      <div class="admin-nav-section">Manage</div>
      <a href="farmers.html"   class="admin-nav-link"><span class="nav-icon">👨‍🌾</span> Farmers</a>
      <a href="inquiries.html" class="admin-nav-link active"><span class="nav-icon">✉</span> Inquiries</a>
      <div class="admin-nav-section">Site</div>
      <a href="../../index.html" class="admin-nav-link"><span class="nav-icon">🏠</span> View Website</a>
    </nav>
    <div class="admin-sidebar-footer">
      <div id="sidebarName" style="color:rgba(255,255,255,0.7);margin-bottom:0.4rem;">Admin</div>
      <button onclick="logout()" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:none;border-radius:6px;padding:0.4rem 0.75rem;font-size:0.75rem;cursor:pointer;font-family:var(--font-body);">Logout</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="admin-main">
    <div class="admin-topbar">
      <span class="admin-topbar-title">Farmer Inquiries</span>
      <div class="admin-topbar-user">
        <div class="admin-user-avatar" id="topbarInitial">A</div>
        <span id="topbarName">Admin</span>
      </div>
    </div>

    <div class="admin-content">

      <!-- Header row -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
        <div>
          <h2 style="font-family:var(--font-display);font-size:1.2rem;color:var(--green-deep);margin-bottom:0.2rem;">All Inquiries</h2>
          <p style="font-size:0.82rem;color:var(--gray-500);margin:0;" id="inqSummary">Loading…</p>
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterBy('all',  this)">All</button>
          <button class="filter-tab"        onclick="filterBy('pending', this)">Pending</button>
          <button class="filter-tab"        onclick="filterBy('responded', this)">Responded</button>
        </div>
      </div>

      <!-- Inquiry list -->
      <div id="inquiryList">
        <div style="text-align:center;padding:3rem;color:var(--gray-500);">Loading inquiries…</div>
      </div>

    </div>
  </main>
</div>

<script>
  const API   = 'http://localhost:5000/api';
  const token = localStorage.getItem('kc_token');
  const user  = JSON.parse(localStorage.getItem('kc_user') || 'null');
  let allInquiries = [];
  let activeFilter = 'all';

  function logout() {
    localStorage.removeItem('kc_token');
    localStorage.removeItem('kc_user');
    window.location.href = '../login.html';
  }

  function isAdmin(u) {
    return u && (u.role === 'owner_admin' || u.role === 'demo_admin');
  }

  async function init() {
    if (!token || !isAdmin(user)) {
      document.getElementById('accessDenied').style.display = 'block';
      return;
    }
    document.getElementById('adminShell').style.display     = 'flex';
    document.getElementById('sidebarName').textContent      = user.name || 'Admin';
    document.getElementById('topbarName').textContent       = user.name || 'Admin';
    document.getElementById('topbarInitial').textContent    = (user.name || 'A')[0].toUpperCase();
    await loadInquiries();
  }

  async function loadInquiries() {
    try {
      const res  = await fetch(`${API}/inquiries`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      allInquiries = data.inquiries || data || [];
      renderInquiries(allInquiries);
    } catch {
      allInquiries = demoInquiries();
      renderInquiries(allInquiries);
    }
  }

  function filterBy(status, btn) {
    activeFilter = status;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === 'all'
      ? allInquiries
      : allInquiries.filter(i => i.status === status);
    renderInquiries(filtered);
  }

  function renderInquiries(list) {
    const pending   = allInquiries.filter(i => i.status === 'pending').length;
    const responded = allInquiries.filter(i => i.status === 'responded').length;
    document.getElementById('inqSummary').textContent =
      `${allInquiries.length} total · ${pending} pending · ${responded} responded`;

    const container = document.getElementById('inquiryList');

    if (!list.length) {
      container.innerHTML = `
        <div class="empty-inq">
          <div class="empty-inq-icon">✉</div>
          <h3 style="font-family:var(--font-display);color:var(--gray-700);margin-bottom:0.5rem;">
            ${activeFilter === 'all' ? 'No inquiries yet' : `No ${activeFilter} inquiries`}
          </h3>
          <p style="font-size:0.875rem;margin:0;">
            Farmer inquiries from product pages will appear here.
          </p>
        </div>`;
      return;
    }

    container.innerHTML = list.map(inq => {
      const farmer      = inq.farmerId || {};
      const product     = inq.productId || {};
      const farmerName  = farmer.name  || inq.farmerName  || 'Unknown Farmer';
      const farmerPhone = farmer.phone || inq.farmerPhone || '';
      const productName = product.name || inq.productName || 'Unknown Product';
      const productCat  = product.category || inq.productCategory || '';
      const date        = inq.createdAt ? new Date(inq.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '—';
      const isPending   = inq.status !== 'responded';

      const waMsg = encodeURIComponent(
        `Hello ${farmerName}, thank you for your inquiry about *${productName}*. `
      );

      return `
        <div class="inq-card ${isPending ? 'pending' : 'responded'}" id="inq-${inq._id || inq.id}">
          <div class="inq-card-header">
            <div class="inq-farmer-row">
              <div class="inq-avatar">${farmerName[0].toUpperCase()}</div>
              <div>
                <div class="inq-farmer-name">${farmerName}</div>
                <div class="inq-farmer-contact">
                  ${farmerPhone
                    ? `<a href="tel:${farmerPhone}" style="color:var(--green-mid);text-decoration:none;">${farmerPhone}</a>`
                    : farmer.email || inq.farmerEmail || ''}
                </div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">
              <span class="inq-product-badge">🌿 ${productName}${productCat ? ' · ' + productCat : ''}</span>
              <span class="status-pill ${isPending ? 'pill-orange' : 'pill-green'}">
                ${isPending ? 'Pending' : 'Responded'}
              </span>
            </div>
          </div>

          <div class="inq-message">"${inq.message}"</div>

          <div class="inq-footer">
            <span class="inq-date">📅 ${date}</span>
            <div class="inq-actions">
              ${farmerPhone
                ? `<a href="https://wa.me/91${farmerPhone}?text=${waMsg}" target="_blank" class="wa-reply">💬 Reply on WhatsApp</a>`
                : ''}
              <button
                class="btn-respond ${isPending ? '' : 'undo'}"
                onclick="toggleStatus('${inq._id || inq.id}', '${isPending ? 'responded' : 'pending'}', this)">
                ${isPending ? '✓ Mark Responded' : '↩ Mark Pending'}
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function toggleStatus(id, newStatus, btn) {
    try {
      await fetch(`${API}/inquiries/${id}`, {
        method  : 'PATCH',
        headers : { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body    : JSON.stringify({ status: newStatus }),
      });
    } catch {}

    // Update local state
    const inq = allInquiries.find(i => (i._id || i.id) === id);
    if (inq) inq.status = newStatus;

    // Update card styling and button text without full re-render
    const card = document.getElementById(`inq-${id}`);
    if (card) {
      card.className = `inq-card ${newStatus}`;
      const pill = card.querySelector('.status-pill');
      if (pill) {
        pill.className  = `status-pill ${newStatus === 'responded' ? 'pill-green' : 'pill-orange'}`;
        pill.textContent = newStatus === 'responded' ? 'Responded' : 'Pending';
      }
      btn.className   = `btn-respond ${newStatus === 'responded' ? 'undo' : ''}`;
      btn.textContent = newStatus === 'responded' ? '↩ Mark Pending' : '✓ Mark Responded';
      btn.setAttribute('onclick', `toggleStatus('${id}', '${newStatus === 'responded' ? 'pending' : 'responded'}', this)`);
    }

    // Update summary
    const pending   = allInquiries.filter(i => i.status === 'pending').length;
    const responded = allInquiries.filter(i => i.status === 'responded').length;
    document.getElementById('inqSummary').textContent =
      `${allInquiries.length} total · ${pending} pending · ${responded} responded`;
  }

  function demoInquiries() {
    return [
      {
        _id: '1', status: 'pending',
        farmerName: 'Ramesh Patil', farmerPhone: '9876543210',
        productName: 'Coragen', productCategory: 'Pesticide',
        message: 'Is 150ml pack available? What is the current price and is there any discount for bulk order of 10 bottles?',
        createdAt: new Date(Date.now() - 3600000),
      },
      {
        _id: '2', status: 'responded',
        farmerName: 'Suresh Shinde', farmerPhone: '9765432109',
        productName: 'NPK 19:19:19', productCategory: 'Water Soluble Fertilizer',
        message: 'Mala 5kg NPK 19:19:19 pahije. Kiti price ahe? Delivery hoil ka Daund la?',
        createdAt: new Date(Date.now() - 86400000),
      },
      {
        _id: '3', status: 'pending',
        farmerName: 'Anita More', farmerPhone: '9654321098',
        productName: 'Cannon', productCategory: 'Insecticide',
        message: 'Cannon insecticide for sugarcane aphid control — which dosage should I use per acre? Is it safe for drip irrigation areas?',
        createdAt: new Date(Date.now() - 172800000),
      },
      {
        _id: '4', status: 'responded',
        farmerName: 'Vijay Jadhav', farmerPhone: '9543210987',
        productName: 'Coriander Seeds', productCategory: 'Seeds',
        message: 'Ashoka coriander seeds — germination rate kiti ahe? 1kg madhye kiti seeds yetat?',
        createdAt: new Date(Date.now() - 259200000),
      },
    ];
  }

  init();
</script>

</body>
</html>
