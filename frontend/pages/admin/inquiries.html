<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inquiries — KrushiConnect Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <style>
    .admin-shell { display:flex; min-height:100vh; background:#F5F7F2; }
    .admin-sidebar { width:220px; min-height:100vh; background:#1A3C2E; display:flex; flex-direction:column; padding:1.5rem 0; position:fixed; top:0; left:0; z-index:100; }
    .admin-sidebar-logo { display:flex; align-items:center; gap:0.6rem; padding:0 1.25rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:1rem; text-decoration:none; }
    .admin-sidebar-logo span { font-family:'Playfair Display',serif; font-size:1rem; color:white; }
    .admin-nav-section { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.4); padding:1rem 1.25rem 0.4rem; }
    .admin-nav-link { display:flex; align-items:center; gap:0.6rem; padding:0.6rem 1.25rem; color:rgba(255,255,255,0.75); text-decoration:none; font-size:0.875rem; font-weight:500; transition:all 0.2s; border-left:3px solid transparent; }
    .admin-nav-link:hover, .admin-nav-link.active { background:rgba(255,255,255,0.08); color:white; border-left-color:#C8A96E; }
    .nav-icon { font-size:1rem; width:20px; text-align:center; }
    .admin-sidebar-footer { margin-top:auto; padding:1rem 1.25rem; border-top:1px solid rgba(255,255,255,0.1); }
    .admin-main { margin-left:220px; flex:1; display:flex; flex-direction:column; }
    .admin-topbar { background:white; padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #E5E7EB; position:sticky; top:0; z-index:50; }
    .admin-topbar-title { font-family:'Playfair Display',serif; font-size:1.2rem; color:#1A3C2E; font-weight:700; }
    .admin-topbar-user { display:flex; align-items:center; gap:0.6rem; font-size:0.875rem; color:#555; }
    .admin-user-avatar { width:32px; height:32px; background:#1A3C2E; color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.875rem; }
    .admin-content { padding:2rem; }

    /* Filter tabs */
    .filter-tabs { display:flex; gap:0.4rem; background:#F3F4F6; border-radius:50px; padding:4px; }
    .filter-tab { padding:0.4rem 1rem; border-radius:50px; border:none; font-size:0.8rem; font-weight:600; cursor:pointer; font-family:inherit; background:transparent; color:#737373; transition:all 0.2s; }
    .filter-tab.active { background:#1A3C2E; color:white; }

    /* Inquiry cards */
    .inq-card { background:white; border-radius:12px; padding:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,0.06); border:1px solid #F0F0F0; margin-bottom:1rem; border-left:4px solid #D1D5DB; transition:border-color 0.2s; }
    .inq-card.pending   { border-left-color:#F59E0B; }
    .inq-card.responded { border-left-color:#22C55E; }
    .inq-card.closed    { border-left-color:#9CA3AF; }
    .inq-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:0.75rem; flex-wrap:wrap; }
    .inq-farmer-row { display:flex; align-items:center; gap:0.65rem; }
    .inq-avatar { width:36px; height:36px; border-radius:50%; background:#1A3C2E; color:white; display:flex; align-items:center; justify-content:center; font-size:0.82rem; font-weight:700; flex-shrink:0; }
    .inq-farmer-name { font-weight:600; font-size:0.9rem; color:#1A3C2E; }
    .inq-farmer-contact { font-size:0.75rem; color:#737373; margin-top:1px; }
    .inq-product-badge { background:#F0F7F0; color:#1A3C2E; font-size:0.75rem; font-weight:600; padding:0.25rem 0.75rem; border-radius:50px; border:1px solid #C8E6C9; }
    .inq-message { font-size:0.9rem; color:#374151; line-height:1.65; background:#FAFAF8; border-radius:8px; padding:0.85rem 1rem; margin-bottom:0.85rem; border-left:3px solid #E5E7EB; }
    .inq-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem; }
    .inq-date { font-size:0.75rem; color:#9CA3AF; }
    .inq-actions { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }

    /* Status pills */
    .pill-orange { background:#FEF3C7; color:#92400E; padding:0.2rem 0.6rem; border-radius:50px; font-size:0.75rem; font-weight:600; }
    .pill-green  { background:#DCFCE7; color:#166534; padding:0.2rem 0.6rem; border-radius:50px; font-size:0.75rem; font-weight:600; }
    .pill-gray   { background:#F3F4F6; color:#6B7280; padding:0.2rem 0.6rem; border-radius:50px; font-size:0.75rem; font-weight:600; }

    /* Buttons */
    .btn-respond { font-size:0.78rem; font-weight:600; padding:0.38rem 0.85rem; border-radius:6px; border:none; cursor:pointer; background:#DCFCE7; color:#166534; font-family:inherit; transition:background 0.2s; }
    .btn-respond:hover { background:#BBF7D0; }
    .btn-respond.undo  { background:#FEF3C7; color:#92400E; }
    .btn-respond.undo:hover { background:#FDE68A; }
    .btn-delete-inq { font-size:0.78rem; font-weight:600; padding:0.38rem 0.85rem; border-radius:6px; border:none; cursor:pointer; background:#FFEBEE; color:#C62828; font-family:inherit; transition:background 0.2s; }
    .btn-delete-inq:hover { background:#FFCDD2; }
    .wa-reply { font-size:0.78rem; font-weight:600; padding:0.38rem 0.85rem; border-radius:6px; border:none; cursor:pointer; background:#DCFCE7; color:#16a34a; text-decoration:none; font-family:inherit; display:inline-flex; align-items:center; gap:0.3rem; }
    .wa-reply:hover { background:#BBF7D0; }

    .empty-inq { text-align:center; padding:4rem 2rem; color:#9CA3AF; }
    .empty-inq-icon { font-size:3rem; margin-bottom:1rem; }
  </style>
</head>
<body class="page-body">

<!-- Access Denied -->
<div class="empty-state" id="accessDenied" style="display:none;padding-top:5rem;">
  <div class="empty-state-icon">🔒</div>
  <h3>Access Denied</h3>
  <p>You must be an admin to view this page.</p>
  <a href="../login.html" class="btn btn-primary">Login as Admin</a>
</div>

<!-- Admin Shell -->
<div class="admin-shell" id="adminShell" style="display:none;">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <a href="dashboard.html" class="admin-sidebar-logo">
      <span style="font-size:1.4rem;">🌾</span>
      <span>KrushiConnect</span>
    </a>
    <div class="admin-nav-section">Products</div>
    <a href="dashboard.html"   class="admin-nav-link"><span class="nav-icon">📊</span> Dashboard</a>
    <a href="add-product.html" class="admin-nav-link"><span class="nav-icon">➕</span> Add Product</a>
    <div class="admin-nav-section">Users</div>
    <a href="farmers.html"   class="admin-nav-link"><span class="nav-icon">👨‍🌾</span> Farmers</a>
    <a href="inquiries.html" class="admin-nav-link active"><span class="nav-icon">✉</span> Inquiries</a>
    <div class="admin-nav-section">Site</div>
    <a href="../../index.html" class="admin-nav-link"><span class="nav-icon">🏠</span> View Website</a>
    <div class="admin-sidebar-footer">
      <div id="sidebarName" style="color:rgba(255,255,255,0.7);margin-bottom:0.4rem;font-size:0.85rem;"></div>
      <button onclick="logout()" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:none;border-radius:6px;padding:0.4rem 0.75rem;font-size:0.75rem;cursor:pointer;font-family:inherit;">Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <span class="admin-topbar-title">Farmer Inquiries</span>
      <div class="admin-topbar-user">
        <div class="admin-user-avatar" id="topbarInitial">A</div>
        <span id="topbarName">Admin</span>
      </div>
    </div>

    <div class="admin-content">

      <!-- Header row -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
        <div>
          <h2 style="font-family:'Playfair Display',serif;font-size:1.2rem;color:#1A3C2E;margin-bottom:0.2rem;">All Inquiries</h2>
          <p style="font-size:0.82rem;color:#9CA3AF;margin:0;" id="inqSummary">Loading...</p>
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterBy('all',       this)">All</button>
          <button class="filter-tab"        onclick="filterBy('pending',   this)">Pending</button>
          <button class="filter-tab"        onclick="filterBy('responded', this)">Responded</button>
          <button class="filter-tab"        onclick="filterBy('closed',    this)">Closed</button>
        </div>
      </div>

      <!-- Inquiry list -->
      <div id="inquiryList">
        <div style="text-align:center;padding:3rem;color:#9CA3AF;">Loading inquiries...</div>
      </div>

    </div>
  </main>
</div>

<script src="../../js/config.js"></script>
<script>
  const API   = typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : 'http://localhost:5000/api';
  const token = localStorage.getItem('kc_token');
  const user  = JSON.parse(localStorage.getItem('kc_user') || 'null');
  let allInquiries = [];
  let activeFilter = 'all';

  function logout() {
    localStorage.removeItem('kc_token');
    localStorage.removeItem('kc_user');
    window.location.href = '../login.html';
  }

  function isAdmin(u) {
    return u && (u.role === 'owner_admin' || u.role === 'demo_admin');
  }

  // ─── Init ─────────────────────────────────────────────────
  async function init() {
    if (!token || !isAdmin(user)) {
      document.getElementById('accessDenied').style.display = 'block';
      return;
    }
    document.getElementById('adminShell').style.display  = 'flex';
    document.getElementById('sidebarName').textContent   = user.name || 'Admin';
    document.getElementById('topbarName').textContent    = user.name || 'Admin';
    document.getElementById('topbarInitial').textContent = (user.name || 'A')[0].toUpperCase();
    await loadInquiries();
  }

  // ─── Load Inquiries from API ──────────────────────────────
  async function loadInquiries() {
    try {
      // ✅ Correct admin endpoint
      const res  = await fetch(`${API}/inquiries/admin/all`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      allInquiries = data.data || data.inquiries || [];
      renderInquiries(allInquiries);
    } catch (err) {
      console.warn('Backend offline, showing demo data:', err.message);
      allInquiries = demoInquiries();
      renderInquiries(allInquiries);
    }
  }

  // ─── Filter ───────────────────────────────────────────────
  function filterBy(status, btn) {
    activeFilter = status;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === 'all'
      ? allInquiries
      : allInquiries.filter(i => i.status === status);
    renderInquiries(filtered);
  }

  // ─── Render Inquiries ─────────────────────────────────────
  function renderInquiries(list) {
    const pending   = allInquiries.filter(i => i.status === 'pending').length;
    const responded = allInquiries.filter(i => i.status === 'responded').length;
    const closed    = allInquiries.filter(i => i.status === 'closed').length;
    document.getElementById('inqSummary').textContent =
      `${allInquiries.length} total · ${pending} pending · ${responded} responded · ${closed} closed`;

    const container = document.getElementById('inquiryList');

    if (!list.length) {
      container.innerHTML = `
        <div class="empty-inq">
          <div class="empty-inq-icon">✉</div>
          <h3 style="font-family:'Playfair Display',serif;color:#374151;margin-bottom:0.5rem;">
            ${activeFilter === 'all' ? 'No inquiries yet' : `No ${activeFilter} inquiries`}
          </h3>
          <p style="font-size:0.875rem;margin:0;">
            Farmer inquiries from product pages will appear here.
          </p>
        </div>`;
      return;
    }

    container.innerHTML = list.map(inq => {
      // Handle both populated objects and plain strings
      const buyer       = inq.buyer   || {};
      const product     = inq.product || {};
      const buyerName   = buyer.name  || 'Unknown Farmer';
      const buyerPhone  = buyer.phone || '';
      const buyerEmail  = buyer.email || '';
      const productName = product.name || 'Unknown Product';
      const productCat  = product.category || '';
      const date        = inq.createdAt
        ? new Date(inq.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
        : '—';
      const status      = inq.status || 'pending';
      const isPending   = status === 'pending';

      const waMsg = encodeURIComponent(
        `Hello ${buyerName}, thank you for your inquiry about *${productName}*. `
      );

      const pillClass = status === 'responded' ? 'pill-green'
                      : status === 'closed'    ? 'pill-gray'
                      : 'pill-orange';

      const pillText = status === 'responded' ? 'Responded'
                     : status === 'closed'    ? 'Closed'
                     : 'Pending';

      return `
        <div class="inq-card ${status}" id="inq-${inq._id}">
          <div class="inq-card-header">
            <div class="inq-farmer-row">
              <div class="inq-avatar">${buyerName[0].toUpperCase()}</div>
              <div>
                <div class="inq-farmer-name">${buyerName}</div>
                <div class="inq-farmer-contact">
                  ${buyerPhone
                    ? `<a href="tel:${buyerPhone}" style="color:#2E7D32;text-decoration:none;">${buyerPhone}</a>`
                    : buyerEmail}
                </div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">
              <span class="inq-product-badge">🌿 ${productName}${productCat ? ' · ' + productCat : ''}</span>
              <span class="${pillClass}">${pillText}</span>
            </div>
          </div>

          <div class="inq-message">"${inq.message || '—'}"</div>

          <div class="inq-footer">
            <span class="inq-date">📅 ${date}</span>
            <div class="inq-actions">
              ${buyerPhone
                ? `<a href="https://wa.me/91${buyerPhone}?text=${waMsg}" target="_blank" class="wa-reply">💬 WhatsApp Reply</a>`
                : ''}
              ${isPending
                ? `<button class="btn-respond" onclick="updateStatus('${inq._id}', 'responded', this)">✓ Mark Responded</button>`
                : `<button class="btn-respond undo" onclick="updateStatus('${inq._id}', 'pending', this)">↩ Mark Pending</button>`}
              <button class="btn-delete-inq" onclick="deleteInquiry('${inq._id}', this)">🗑 Delete</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ─── Update Inquiry Status ────────────────────────────────
  async function updateStatus(id, newStatus, btn) {
    try {
      await fetch(`${API}/inquiries/${id}/status`, {
        method : 'PUT',
        headers: {
          'Content-Type' : 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ status: newStatus })
      });
    } catch (err) {
      console.warn('Could not update status:', err.message);
    }

    // Update local state
    const inq = allInquiries.find(i => i._id === id);
    if (inq) inq.status = newStatus;

    // Update card without full re-render
    const card = document.getElementById(`inq-${id}`);
    if (card) {
      card.className = `inq-card ${newStatus}`;
      const pill = card.querySelector('[class^="pill-"], [class*=" pill-"]');
      if (pill) {
        pill.className   = newStatus === 'responded' ? 'pill-green' : 'pill-orange';
        pill.textContent = newStatus === 'responded' ? 'Responded' : 'Pending';
      }
      btn.className   = `btn-respond${newStatus === 'responded' ? ' undo' : ''}`;
      btn.textContent = newStatus === 'responded' ? '↩ Mark Pending' : '✓ Mark Responded';
      btn.setAttribute('onclick', `updateStatus('${id}', '${newStatus === 'responded' ? 'pending' : 'responded'}', this)`);
    }

    // Refresh summary
    const pending   = allInquiries.filter(i => i.status === 'pending').length;
    const responded = allInquiries.filter(i => i.status === 'responded').length;
    const closed    = allInquiries.filter(i => i.status === 'closed').length;
    document.getElementById('inqSummary').textContent =
      `${allInquiries.length} total · ${pending} pending · ${responded} responded · ${closed} closed`;
  }

  // ─── Delete Inquiry ───────────────────────────────────────
  async function deleteInquiry(id, btn) {
    if (!confirm('Delete this inquiry? This cannot be undone.')) return;
    try {
      const res = await fetch(`${API}/inquiries/${id}`, {
        method : 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      });
      if (res.ok) {
        // Remove from local array and DOM
        allInquiries = allInquiries.filter(i => i._id !== id);
        const card = document.getElementById(`inq-${id}`);
        if (card) card.remove();
        // Refresh summary
        const pending   = allInquiries.filter(i => i.status === 'pending').length;
        const responded = allInquiries.filter(i => i.status === 'responded').length;
        document.getElementById('inqSummary').textContent =
          `${allInquiries.length} total · ${pending} pending · ${responded} responded`;
      }
    } catch (err) {
      alert('Could not delete inquiry.');
    }
  }

  // ─── Demo Data (when server is off) ──────────────────────
  function demoInquiries() {
    return [
      {
        _id: '1', status: 'pending',
        buyer:   { name: 'Ramesh Patil',  phone: '9876543210', email: 'ramesh@gmail.com' },
        product: { name: 'Coragen',       category: 'Pesticide' },
        message: 'Is 150ml pack available? What is the current price?',
        createdAt: new Date(Date.now() - 3600000),
      },
      {
        _id: '2', status: 'responded',
        buyer:   { name: 'Suresh Shinde', phone: '9765432109', email: 'suresh@gmail.com' },
        product: { name: 'NPK 19:19:19',  category: 'Water Soluble Fertilizer' },
        message: 'Mala 5kg NPK 19:19:19 pahije. Kiti price ahe?',
        createdAt: new Date(Date.now() - 86400000),
      },
      {
        _id: '3', status: 'pending',
        buyer:   { name: 'Anita More',    phone: '9654321098', email: 'anita@gmail.com' },
        product: { name: 'Cannon',        category: 'Insecticide' },
        message: 'Cannon insecticide for sugarcane — which dosage per acre?',
        createdAt: new Date(Date.now() - 172800000),
      },
    ];
  }

  // ─── Run ──────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
