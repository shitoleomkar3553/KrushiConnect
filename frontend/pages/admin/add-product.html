<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product — KrushiConnect Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
  <style>
    .admin-shell { display:flex; min-height:100vh; background:#F5F7F2; }
    .admin-sidebar { width:220px; min-height:100vh; background:#1A3C2E; display:flex; flex-direction:column; padding:1.5rem 0; position:fixed; top:0; left:0; z-index:100; }
    .admin-sidebar-logo { display:flex; align-items:center; gap:0.6rem; padding:0 1.25rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:1rem; text-decoration:none; }
    .admin-sidebar-logo span { font-family:'Playfair Display',serif; font-size:1rem; color:white; }
    .admin-nav-section { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.4); padding:1rem 1.25rem 0.4rem; }
    .admin-nav-link { display:flex; align-items:center; gap:0.6rem; padding:0.6rem 1.25rem; color:rgba(255,255,255,0.75); text-decoration:none; font-size:0.875rem; font-weight:500; transition:all 0.2s; border-left:3px solid transparent; }
    .admin-nav-link:hover, .admin-nav-link.active { background:rgba(255,255,255,0.08); color:white; border-left-color:#C8A96E; }
    .nav-icon { font-size:1rem; width:20px; text-align:center; }
    .admin-sidebar-footer { margin-top:auto; padding:1rem 1.25rem; border-top:1px solid rgba(255,255,255,0.1); }
    .admin-main { margin-left:220px; flex:1; display:flex; flex-direction:column; }
    .admin-topbar { background:white; padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #E5E7EB; position:sticky; top:0; z-index:50; }
    .admin-topbar-title { font-family:'Playfair Display',serif; font-size:1.2rem; color:#1A3C2E; font-weight:700; }
    .admin-topbar-user { display:flex; align-items:center; gap:0.6rem; font-size:0.875rem; color:#555; }
    .admin-user-avatar { width:32px; height:32px; background:#1A3C2E; color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.875rem; }
    .admin-content { padding:2rem; }
    .content-card { background:white; border-radius:12px; padding:2rem; box-shadow:0 2px 8px rgba(0,0,0,0.06); max-width:800px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
    .form-group { display:flex; flex-direction:column; gap:0.35rem; }
    .form-group.full { grid-column:1 / -1; }
    .form-label { font-size:0.8rem; font-weight:600; color:#404040; }
    .form-input { padding:0.7rem 1rem; border:1.5px solid #D4D4D4; border-radius:8px; font-size:0.9375rem; font-family:'Inter',sans-serif; color:#2C1810; background:#FAFAFA; transition:border-color 0.2s; outline:none; width:100%; }
    .form-input:focus { border-color:#2E6B4F; background:white; }
    textarea.form-input { resize:vertical; }
    .form-hint { font-size:0.75rem; color:#9E9E9E; margin-top:0.2rem; }
    .img-preview-box { border:2px dashed #D4D4D4; border-radius:10px; padding:2rem; text-align:center; cursor:pointer; transition:border-color 0.2s; display:flex; flex-direction:column; align-items:center; gap:0.5rem; min-height:140px; justify-content:center; }
    .img-preview-box:hover { border-color:#2E6B4F; }
    .img-preview-box img { max-height:160px; max-width:100%; object-fit:contain; border-radius:8px; }
    .upload-hint { font-size:0.875rem; color:#9E9E9E; }
    .alert-error { display:none; background:#FFF3F3; border:1.5px solid #f5c6c6; color:#c62828; font-size:0.875rem; padding:0.75rem 1rem; border-radius:8px; margin-bottom:1.25rem; }
    .alert-error.visible { display:block; }
    .alert-success { display:none; background:#F1F8E9; border:1.5px solid #c5e1a5; color:#2e7d32; font-size:0.875rem; padding:0.75rem 1rem; border-radius:8px; margin-bottom:1.25rem; }
    .alert-success.visible { display:block; }
    .btn-submit { padding:0.8rem 2rem; background:#1A3C2E; color:white; border:none; border-radius:50px; font-size:0.9375rem; font-weight:600; cursor:pointer; transition:background 0.25s; font-family:inherit; }
    .btn-submit:hover:not(:disabled) { background:#2E6B4F; }
    .btn-submit:disabled { background:#9E9E9E; cursor:not-allowed; }
  </style>
</head>
<body class="page-body">

<!-- Access Denied -->
<div class="empty-state" id="accessDenied" style="display:none;padding-top:5rem;">
  <div class="empty-state-icon">🔒</div>
  <h3>Access Denied</h3>
  <p>You must be an admin to view this page.</p>
  <a href="../login.html" class="btn btn-primary">Login as Admin</a>
</div>

<!-- Admin Shell -->
<div class="admin-shell" id="adminShell" style="display:none;">

  <aside class="admin-sidebar">
    <a href="dashboard.html" class="admin-sidebar-logo">
      <span style="font-size:1.4rem;">🌾</span>
      <span>KrushiConnect</span>
    </a>
    <div class="admin-nav-section">Products</div>
    <a href="dashboard.html"   class="admin-nav-link"><span class="nav-icon">📊</span> Dashboard</a>
    <a href="add-product.html" class="admin-nav-link active"><span class="nav-icon">➕</span> Add Product</a>
    <div class="admin-nav-section">Users</div>
    <a href="farmers.html"   class="admin-nav-link"><span class="nav-icon">👨‍🌾</span> Farmers</a>
    <a href="inquiries.html" class="admin-nav-link"><span class="nav-icon">✉</span> Inquiries</a>
    <div class="admin-nav-section">Site</div>
    <a href="../../index.html" class="admin-nav-link"><span class="nav-icon">🏠</span> View Website</a>
    <div class="admin-sidebar-footer">
      <div id="sidebarName" style="color:rgba(255,255,255,0.7);margin-bottom:0.4rem;font-size:0.85rem;"></div>
      <button onclick="logout()" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:none;border-radius:6px;padding:0.4rem 0.75rem;font-size:0.75rem;cursor:pointer;font-family:inherit;">Logout</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <span class="admin-topbar-title">Add New Product</span>
      <div class="admin-topbar-user">
        <div class="admin-user-avatar" id="topbarInitial">A</div>
        <span id="topbarName">Admin</span>
      </div>
    </div>

    <div class="admin-content">
      <div class="content-card">

        <div class="alert-error"   id="formError"></div>
        <div class="alert-success" id="formSuccess"></div>

        <form id="addProductForm" novalidate>
          <div class="form-grid">

            <div class="form-group">
              <label class="form-label">Product Name *</label>
              <input class="form-input" type="text" id="name" placeholder="e.g. NPK 19:19:19" required />
            </div>

            <div class="form-group">
              <label class="form-label">Company Name *</label>
              <input class="form-input" type="text" id="company" placeholder="e.g. Jai Kisaan" required />
            </div>

            <div class="form-group">
              <label class="form-label">Category *</label>
              <select class="form-input" id="category" required>
                <option value="">Select category</option>
                <option value="Water Soluble Fertilizers">Water Soluble Fertilizers</option>
                <option value="Insecticides">Insecticides</option>
                <option value="Pesticides">Pesticides</option>
                <option value="Herbicides">Herbicides</option>
                <option value="Seeds">Seeds</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Price (₹) *</label>
              <input class="form-input" type="number" id="price" placeholder="e.g. 200" min="0" required />
            </div>

            <div class="form-group">
              <label class="form-label">Unit</label>
              <select class="form-input" id="unit">
                <option value="kg">per kg</option>
                <option value="ltr">per ltr</option>
                <option value="bag">per bag</option>
                <option value="packet">per packet</option>
                <option value="unit">per unit</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Stock Quantity</label>
              <input class="form-input" type="number" id="stockQuantity" placeholder="e.g. 50" min="0" />
            </div>

            <div class="form-group">
              <label class="form-label">Expiry Date</label>
              <input class="form-input" type="date" id="expiryDate" />
            </div>

            <div class="form-group" style="display:flex;align-items:center;gap:1.5rem;padding-top:1.5rem;">
              <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.875rem;font-weight:500;">
                <input type="checkbox" id="isAvailable" checked style="width:16px;height:16px;accent-color:#1A3C2E;" />
                Available for sale
              </label>
              <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.875rem;font-weight:500;">
                <input type="checkbox" id="isFeatured" style="width:16px;height:16px;accent-color:#1A3C2E;" />
                Mark as Featured
              </label>
            </div>

            <div class="form-group full">
              <label class="form-label">Product Description *</label>
              <textarea class="form-input" id="description" rows="3" placeholder="Describe the product, its benefits, and composition…" required></textarea>
            </div>

            <div class="form-group full">
              <label class="form-label">Usage Information</label>
              <textarea class="form-input" id="usage" rows="3" placeholder="How to use — dosage, method, timing…"></textarea>
            </div>

            <div class="form-group full">
              <label class="form-label">Suitable Crops</label>
              <input class="form-input" type="text" id="suitableCrops" placeholder="Sugarcane, Onion, Wheat, Tomato (comma separated)" />
              <span class="form-hint">Separate each crop with a comma</span>
            </div>

            <div class="form-group full">
              <label class="form-label">Product Image</label>
              <div class="img-preview-box" id="imgPreview" onclick="document.getElementById('imageFile').click()">
                <span style="font-size:2rem;">📷</span>
                <span class="upload-hint">Click to upload product image<br/><span style="font-size:0.75rem;opacity:0.7;">JPG, PNG — max 2MB</span></span>
              </div>
              <input type="file" id="imageFile" accept="image/*" style="display:none;" onchange="previewImage(this)" />
            </div>

          </div>

          <div style="display:flex;gap:1rem;margin-top:1.5rem;align-items:center;">
            <button type="submit" class="btn-submit" id="submitBtn">Add Product</button>
            <a href="dashboard.html" style="padding:0.8rem 1.5rem;background:#F5F5F5;color:#555;border-radius:50px;text-decoration:none;font-weight:600;font-size:0.9375rem;">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="../../js/config.js"></script>
<script>
  const API   = typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : 'http://localhost:5000/api';
  const token = localStorage.getItem('kc_token');
  const user  = JSON.parse(localStorage.getItem('kc_user') || 'null');

  function isAdmin(u) {
    return u && (u.role === 'owner_admin' || u.role === 'demo_admin');
  }

  function logout() {
    localStorage.removeItem('kc_token');
    localStorage.removeItem('kc_user');
    window.location.href = '../login.html';
  }

  function init() {
    if (!token || !isAdmin(user)) {
      document.getElementById('accessDenied').style.display = 'block';
      return;
    }
    document.getElementById('adminShell').style.display  = 'flex';
    document.getElementById('sidebarName').textContent   = user.name || 'Admin';
    document.getElementById('topbarName').textContent    = user.name || 'Admin';
    document.getElementById('topbarInitial').textContent = (user.name || 'A')[0].toUpperCase();
  }

  function previewImage(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      showError('Image must be under 2MB.');
      input.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('imgPreview').innerHTML =
        `<img src="${e.target.result}" alt="Preview" />
         <span class="form-hint" style="margin-top:0.5rem;">${file.name} — Click to change</span>`;
    };
    reader.readAsDataURL(file);
  }

  function showError(msg) {
    const el = document.getElementById('formError');
    el.textContent = msg;
    el.classList.add('visible');
    document.getElementById('formSuccess').classList.remove('visible');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function showSuccess(msg) {
    const el = document.getElementById('formSuccess');
    el.textContent = msg;
    el.classList.add('visible');
    document.getElementById('formError').classList.remove('visible');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  document.getElementById('addProductForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    document.getElementById('formError').classList.remove('visible');
    document.getElementById('formSuccess').classList.remove('visible');

    const name          = document.getElementById('name').value.trim();
    const company       = document.getElementById('company').value.trim();
    const category      = document.getElementById('category').value;
    const price         = document.getElementById('price').value;
    const unit          = document.getElementById('unit').value;
    const stockQuantity = document.getElementById('stockQuantity').value;
    const expiryDate    = document.getElementById('expiryDate').value;
    const isAvailable   = document.getElementById('isAvailable').checked;
    const isFeatured    = document.getElementById('isFeatured').checked;
    const description   = document.getElementById('description').value.trim();
    const usage         = document.getElementById('usage').value.trim();
    const cropsRaw      = document.getElementById('suitableCrops').value.trim();

    if (!name)        { showError('Product name is required.');  return; }
    if (!company)     { showError('Company name is required.');  return; }
    if (!category)    { showError('Please select a category.');  return; }
    if (!price)       { showError('Price is required.');         return; }
    if (!description) { showError('Description is required.');   return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled    = true;
    btn.textContent = 'Adding Product...';

    try {
      // ── Build FormData so image upload works ──
      const formData = new FormData();
      formData.append('name',          name);
      formData.append('company',       company);
      formData.append('category',      category);
      formData.append('price',         price);
      formData.append('unit',          unit);
      formData.append('stockQuantity', stockQuantity || 0);
      formData.append('description',   description);
      formData.append('usage',         usage);
      formData.append('isAvailable',   isAvailable);
      formData.append('isFeatured',    isFeatured);
      formData.append('expiryDate',    expiryDate || '');
      formData.append('suitableCrops', cropsRaw);

      // Attach image if selected
      const imageFile = document.getElementById('imageFile').files[0];
      if (imageFile) formData.append('image', imageFile);

      // ⚠️ Do NOT set Content-Type — browser sets it automatically for FormData
      const res = await fetch(`${API}/products`, {
        method : 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body   : formData
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.message || 'Failed to add product.');
        btn.disabled    = false;
        btn.textContent = 'Add Product';
        return;
      }

      showSuccess(`✅ "${name}" added successfully! Redirecting to dashboard...`);
      this.reset();
      document.getElementById('imgPreview').innerHTML = `
        <span style="font-size:2rem;">📷</span>
        <span class="upload-hint">Click to upload product image</span>`;

      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);

    } catch (err) {
      showError('Cannot connect to server. Make sure the server is running.');
      btn.disabled    = false;
      btn.textContent = 'Add Product';
      console.error('Add product error:', err.message);
    }
  });

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
