<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product — KrushiConnect Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pages.css" />
</head>
<body class="page-body">

<div class="admin-shell" id="adminShell" style="display:none;">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <a href="dashboard.html" class="admin-sidebar-logo">
      <div class="admin-sidebar-logo-mark">🌾</div>
      <div class="admin-sidebar-logo-text">
        <span class="admin-sidebar-logo-name">KrushiConnect</span>
        <span class="admin-sidebar-logo-role">Admin Panel</span>
      </div>
    </a>
    <nav class="admin-nav">
      <div class="admin-nav-section">Main</div>
      <a href="dashboard.html"   class="admin-nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="add-product.html" class="admin-nav-link active"><span class="nav-icon">➕</span> Add Product</a>
      <div class="admin-nav-section">Manage</div>
      <a href="farmers.html"    class="admin-nav-link"><span class="nav-icon">👨‍🌾</span> Farmers</a>
      <a href="inquiries.html"  class="admin-nav-link"><span class="nav-icon">✉</span> Inquiries</a>
      <div class="admin-nav-section">Site</div>
      <a href="../../index.html" class="admin-nav-link"><span class="nav-icon">🏠</span> View Website</a>
    </nav>
    <div class="admin-sidebar-footer">
      <div id="sidebarName" style="color:rgba(255,255,255,0.7);margin-bottom:0.4rem;">Admin</div>
      <button onclick="logout()" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:none;border-radius:6px;padding:0.4rem 0.75rem;font-size:0.75rem;cursor:pointer;font-family:var(--font-body);">Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <span class="admin-topbar-title">Add New Product</span>
      <div class="admin-topbar-user">
        <div class="admin-user-avatar" id="topbarInitial">A</div>
        <span id="topbarName">Admin</span>
      </div>
    </div>

    <div class="admin-content">
      <div class="content-card" style="max-width:800px;">

        <div class="alert alert-error"   id="formError"></div>
        <div class="alert alert-success" id="formSuccess"></div>

        <form id="addProductForm" enctype="multipart/form-data" novalidate>

          <div class="form-grid">

            <div class="form-group">
              <label class="form-label">Product Name *</label>
              <input class="form-input" type="text" id="name" placeholder="e.g. NPK 19:19:19" required />
            </div>

            <div class="form-group">
              <label class="form-label">Company Name *</label>
              <input class="form-input" type="text" id="company" placeholder="e.g. Jai Kisaan" required />
            </div>

            <div class="form-group">
              <label class="form-label">Category *</label>
              <select class="form-input" id="category" required>
                <option value="">Select category</option>
                <option>Water Soluble Fertilizers</option>
                <option>Insecticides</option>
                <option>Pesticides</option>
                <option>Herbicides</option>
                <option>Seeds</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Price (₹) *</label>
              <input class="form-input" type="number" id="price" placeholder="e.g. 200" min="0" required />
            </div>

            <div class="form-group">
              <label class="form-label">Unit</label>
              <select class="form-input" id="unit">
                <option value="kg">per kg</option>
                <option value="ltr">per ltr</option>
                <option value="bag">per bag</option>
                <option value="packet">per packet</option>
                <option value="unit">per unit</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Stock Quantity</label>
              <input class="form-input" type="number" id="stockQuantity" placeholder="e.g. 50" min="0" />
            </div>

            <div class="form-group">
              <label class="form-label">Expiry Date</label>
              <input class="form-input" type="date" id="expiryDate" />
            </div>

            <div class="form-group" style="display:flex;align-items:center;gap:1.5rem;padding-top:1.5rem;">
              <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.875rem;font-weight:500;">
                <input type="checkbox" id="isAvailable" checked style="width:16px;height:16px;accent-color:var(--green-deep);" />
                Available for sale
              </label>
              <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.875rem;font-weight:500;">
                <input type="checkbox" id="isFeatured" style="width:16px;height:16px;accent-color:var(--green-deep);" />
                Mark as Featured
              </label>
            </div>

            <div class="form-group full">
              <label class="form-label">Product Description *</label>
              <textarea class="form-input" id="description" rows="3" placeholder="Describe the product, its benefits, and composition…" required></textarea>
            </div>

            <div class="form-group full">
              <label class="form-label">Usage Information</label>
              <textarea class="form-input" id="usage" rows="3" placeholder="How to use this product — dosage, method, timing…"></textarea>
            </div>

            <div class="form-group full">
              <label class="form-label">Suitable Crops</label>
              <input class="form-input" type="text" id="suitableCrops" placeholder="Sugarcane, Onion, Wheat, Tomato (comma separated)" />
              <span class="form-hint">Separate each crop with a comma</span>
            </div>

            <!-- Image upload -->
            <div class="form-group full">
              <label class="form-label">Product Image</label>
              <div class="img-preview-box" id="imgPreview" onclick="document.getElementById('imageFile').click()">
                <span style="font-size:2rem;">📷</span>
                <span class="upload-hint">Click to upload product image<br/><span style="font-size:0.75rem;opacity:0.7;">JPG, PNG — max 2MB</span></span>
              </div>
              <input type="file" id="imageFile" accept="image/*" style="display:none;" onchange="previewImage(this)" />
            </div>

          </div>

          <div style="display:flex;gap:1rem;margin-top:1rem;">
            <button type="submit" class="btn-submit" id="submitBtn" style="max-width:200px;">Add Product</button>
            <a href="dashboard.html" class="btn" style="background:var(--gray-100);color:var(--gray-700);">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  </main>

</div>

<!-- Access denied -->
<div class="empty-state" id="accessDenied" style="display:none;padding-top:5rem;">
  <div class="empty-state-icon">🔐</div>
  <h3>Admin Access Required</h3>
  <a href="../login.html" class="btn btn-primary">Login</a>
</div>

<script>
  const API   = 'http://localhost:5000/api';
  const token = localStorage.getItem('kc_token');
  const user  = JSON.parse(localStorage.getItem('kc_user') || 'null');

  function logout() { localStorage.removeItem('kc_token'); localStorage.removeItem('kc_user'); window.location.href='../login.html'; }
  function isAdmin(u) { return u && (u.role==='owner_admin'||u.role==='demo_admin'); }

  function init() {
    if (!token || !isAdmin(user)) { document.getElementById('accessDenied').style.display='block'; return; }
    document.getElementById('adminShell').style.display='flex';
    document.getElementById('sidebarName').textContent = user.name||'Admin';
    document.getElementById('topbarName').textContent  = user.name||'Admin';
    document.getElementById('topbarInitial').textContent = (user.name||'A')[0].toUpperCase();
  }

  function previewImage(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('imgPreview').innerHTML = `<img src="${e.target.result}" alt="Preview" />`;
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('addProductForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const cat  = document.getElementById('category').value;
    const desc = document.getElementById('description').value.trim();
    const price= document.getElementById('price').value;

    if (!name || !cat || !desc || !price) {
      const err = document.getElementById('formError');
      err.textContent = 'Please fill in all required fields (Name, Category, Description, Price).';
      err.classList.add('visible'); return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled=true; btn.textContent='Saving…';

    const fd = new FormData();
    fd.append('name',          name);
    fd.append('company',       document.getElementById('company').value.trim());
    fd.append('category',      cat);
    fd.append('price',         price);
    fd.append('unit',          document.getElementById('unit').value);
    fd.append('stockQuantity', document.getElementById('stockQuantity').value || 0);
    fd.append('expiryDate',    document.getElementById('expiryDate').value);
    fd.append('description',   desc);
    fd.append('usage',         document.getElementById('usage').value.trim());
    fd.append('suitableCrops', document.getElementById('suitableCrops').value.trim());
    fd.append('isAvailable',   document.getElementById('isAvailable').checked);
    fd.append('isFeatured',    document.getElementById('isFeatured').checked);
    const imgFile = document.getElementById('imageFile').files[0];
    if (imgFile) fd.append('image', imgFile);

    try {
      const res  = await fetch(`${API}/products`, { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body: fd });
      const data = await res.json();
      if (res.ok) {
        const s = document.getElementById('formSuccess');
        s.textContent = `"${name}" added successfully!`; s.classList.add('visible');
        e.target.reset();
        document.getElementById('imgPreview').innerHTML = '<span style="font-size:2rem;">📷</span><span class="upload-hint">Click to upload product image</span>';
        setTimeout(() => window.location.href='dashboard.html', 1500);
      } else {
        const err = document.getElementById('formError');
        err.textContent = data.message||'Failed to add product.'; err.classList.add('visible');
      }
    } catch {
      const s = document.getElementById('formSuccess');
      s.textContent = 'Backend offline — product will be saved when server is running.'; s.classList.add('visible');
    }
    btn.disabled=false; btn.textContent='Add Product';
  });

  init();
</script>

</body>
</html>
