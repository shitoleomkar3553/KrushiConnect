<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse all agricultural products — KrushiConnect, Shri Sideshwar Agro Agency" />
  <title>Products — KrushiConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <style>
    /* Page shell */
    .products-page { padding-top: var(--nav-h); min-height: 100vh; }

    /* Page hero banner */
    .page-hero {
      background: var(--green-deep);
      padding: 3rem 0 2.5rem;
      color: white;
    }
    .page-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      color: white;
      margin-bottom: 0.4rem;
    }
    .page-hero p { color: rgba(255,255,255,0.7); margin: 0; font-size: 1rem; }

    /* Sticky filter bar */
    .filter-bar {
      background: white;
      border-bottom: 1px solid rgba(26,60,46,0.1);
      position: sticky;
      top: var(--nav-h);
      z-index: 90;
      box-shadow: 0 2px 10px rgba(26,60,46,0.07);
    }
    .filter-bar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0.85rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* Search box */
    .search-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--gray-100);
      border: 1.5px solid var(--gray-300);
      border-radius: 50px;
      padding: 0.55rem 1rem;
      transition: border-color 0.2s;
      flex: 1;
      max-width: 340px;
    }
    .search-box:focus-within { border-color: var(--green-mid); background: white; }
    .search-box input {
      border: none; background: transparent;
      font-size: 0.875rem; font-family: var(--font-body);
      outline: none; width: 100%; color: var(--earth);
    }
    .search-box input::placeholder { color: var(--gray-500); }

    /* Category pills */
    .cat-pills {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      flex: 1;
    }
    .cat-pill {
      padding: 0.42rem 1rem;
      border-radius: 50px;
      border: 1.5px solid var(--gray-300);
      font-size: 0.78rem;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      background: white;
      color: var(--gray-700);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-pill:hover { border-color: var(--green-mid); color: var(--green-mid); }
    .cat-pill.active {
      background: var(--green-deep);
      border-color: var(--green-deep);
      color: white;
    }

    /* Results info */
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .results-count { font-size: 0.875rem; color: var(--gray-500); }

    /* Sort select */
    .sort-select {
      padding: 0.42rem 0.85rem;
      border: 1.5px solid var(--gray-300);
      border-radius: 8px;
      font-size: 0.8125rem;
      font-family: var(--font-body);
      color: var(--gray-700);
      background: white;
      cursor: pointer;
      outline: none;
    }

    /* Products grid */
    .all-products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
    }

    /* Product card — same as homepage */
    .product-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(26,60,46,0.07);
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lift); }

    .product-card-img {
      height: 190px;
      background: white;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(26,60,46,0.06);
      position: relative;
    }
    .product-card-img img {
      width: 100%; height: 100%;
      object-fit: contain; padding: 1rem;
    }
    .product-card-img .img-emoji { font-size: 3.5rem; }
    .product-card-badge { position: absolute; top: 0.65rem; left: 0.65rem; }

    .product-card-body { padding: 1rem; }
    .product-card-cat  { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green-fresh); margin-bottom: 0.3rem; }
    .product-card-name { font-family: var(--font-display); font-size: 1rem; color: var(--green-deep); margin-bottom: 0.2rem; line-height: 1.3; }
    .product-card-co   { font-size: 0.78rem; color: var(--gray-500); margin-bottom: 0.85rem; }
    .product-card-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 0.75rem; border-top: 1px solid var(--gray-100);
    }
    .product-card-price { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--green-deep); }
    .product-card-price span { font-family: var(--font-body); font-size: 0.72rem; font-weight: 400; color: var(--gray-500); }
    .btn-view-card {
      font-size: 0.75rem; font-weight: 600;
      padding: 0.38rem 0.85rem; border-radius: 50px;
      background: var(--green-deep); color: white;
      text-decoration: none; transition: background 0.2s;
    }
    .btn-view-card:hover { background: var(--green-mid); color: white; }

    /* No results */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--gray-500);
    }
    .no-results-icon { font-size: 3rem; margin-bottom: 1rem; }

    /* Skeleton loader */
    .skeleton-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .skeleton-img  { height: 190px; background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    .skeleton-body { padding: 1rem; }
    .skeleton-line { height: 12px; background: #f0f0f0; border-radius: 6px; margin-bottom: 0.65rem; animation: shimmer 1.4s infinite; }
    .skeleton-line.w80 { width: 80%; }
    .skeleton-line.w50 { width: 50%; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Responsive */
    @media (max-width: 1024px) { .all-products-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px)  {
      .all-products-grid { grid-template-columns: repeat(2, 1fr); }
      .filter-bar-inner  { gap: 0.75rem; }
      .search-box        { max-width: 100%; }
    }
    @media (max-width: 480px)  { .all-products-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="page-body">

<!-- Navbar (same as homepage) -->
<nav class="navbar" id="navbar">
  <div class="container">
    <a href="../index.html" class="nav-logo">
      <div class="nav-logo-mark">🌾</div>
      <div class="nav-logo-text">
        <span class="nav-logo-name">KrushiConnect</span>
        <span class="nav-logo-sub">Shri Sideshwar Agro Agency</span>
      </div>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html"         class="nav-link">Home</a></li>
      <li><a href="products.html"         class="nav-link active">Products</a></li>
      <li><a href="../index.html#about-kc" class="nav-link">About</a></li>
      <li><a href="../index.html#contact"  class="nav-link">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <div class="lang-toggle">
        <button class="lang-btn active" id="langEN">ENG</button>
        <button class="lang-btn"        id="langMR">MARATHI</button>
      </div>
      <a href="login.html" class="btn-nav-login" id="navLoginBtn">Login</a>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div class="products-page">

  <!-- Page hero -->
  <div class="page-hero">
    <div class="container">
      <h1>All Products</h1>
      <p>Quality agricultural inputs for every crop and every season</p>
    </div>
  </div>

  <!-- Sticky filter bar -->
  <div class="filter-bar">
    <div class="filter-bar-inner">

      <!-- Search -->
      <div class="search-box">
        <span>🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search products, companies…"
          oninput="applyFilters()"
        />
      </div>

      <!-- Category pills -->
      <div class="cat-pills">
        <button class="cat-pill active" data-cat="all"                         onclick="setCat(this)">All</button>
        <button class="cat-pill"        data-cat="Water Soluble Fertilizers"   onclick="setCat(this)">💧 Water Soluble</button>
        <button class="cat-pill"        data-cat="Insecticides"                onclick="setCat(this)">🐛 Insecticides</button>
        <button class="cat-pill"        data-cat="Pesticides"                  onclick="setCat(this)">🌾 Pesticides</button>
        <button class="cat-pill"        data-cat="Herbicides"                  onclick="setCat(this)">🍃 Herbicides</button>
        <button class="cat-pill"        data-cat="Seeds"                       onclick="setCat(this)">🌱 Seeds</button>
      </div>

    </div>
  </div>

  <!-- Products area -->
  <div class="container" style="padding-top:2rem;padding-bottom:4rem;">

    <div class="results-bar">
      <span class="results-count" id="resultsCount">Loading products…</span>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="default">Sort: Default</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="name-asc">Name: A → Z</option>
        <option value="name-desc">Name: Z → A</option>
      </select>
    </div>

    <div class="all-products-grid" id="productsGrid">
      <!-- Skeleton loaders -->
      ${[1,2,3,4,5,6,7,8].map(() => `
        <div class="skeleton-card">
          <div class="skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton-line w80"></div>
            <div class="skeleton-line w50"></div>
          </div>
        </div>`).join('')}
    </div>

  </div>
</div>

<!-- WhatsApp float -->
<a href="https://wa.me/918390703553" target="_blank" class="wa-float" title="Chat on WhatsApp">💬</a>

<script src="../js/navbar.js"></script>
<script>
  const API = 'http://localhost:5000/api';
  let allProducts   = [];
  let activeCategory = 'all';

  // Category emoji map
  const catEmoji = {
    'Water Soluble Fertilizers': '💧',
    'Insecticides':              '🐛',
    'Pesticides':                '🌾',
    'Herbicides':                '🍃',
    'Seeds':                     '🌱',
  };

  // Local image map for demo mode
  const localImgs = {
    'NPK 19:19:19':   '../assets/images/npk-191919.jpg',
    'Cannon':         '../assets/images/cannon.jpg',
    'Coragen':        '../assets/images/coragen.jpg',
    'Coriander Seeds':'../assets/images/coriander.jpg',
    'Coriander':      '../assets/images/coriander.jpg',
  };

  async function loadProducts() {
    try {
      const res  = await fetch(`${API}/products`);
      const data = await res.json();
      allProducts = data.products || data || [];
      if (!allProducts.length) throw new Error('empty');
    } catch {
      allProducts = demoProducts();
    }
    applyFilters();
  }

  function setCat(btn) {
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.getAttribute('data-cat');
    applyFilters();
  }

  function applyFilters() {
    const q    = document.getElementById('searchInput').value.toLowerCase().trim();
    const sort = document.getElementById('sortSelect').value;

    let list = allProducts.filter(p => {
      const matchCat    = activeCategory === 'all' || p.category === activeCategory;
      const matchSearch = !q
        || (p.name    || '').toLowerCase().includes(q)
        || (p.company || '').toLowerCase().includes(q)
        || (p.category|| '').toLowerCase().includes(q);
      return matchCat && matchSearch;
    });

    // Sort
    if (sort === 'price-asc')  list.sort((a,b) => (a.price||0) - (b.price||0));
    if (sort === 'price-desc') list.sort((a,b) => (b.price||0) - (a.price||0));
    if (sort === 'name-asc')   list.sort((a,b) => (a.name||'').localeCompare(b.name||''));
    if (sort === 'name-desc')  list.sort((a,b) => (b.name||'').localeCompare(a.name||''));

    renderGrid(list);
  }

  function renderGrid(list) {
    const count = document.getElementById('resultsCount');
    count.textContent = list.length
      ? `Showing ${list.length} product${list.length !== 1 ? 's' : ''}`
      : '';

    const grid = document.getElementById('productsGrid');

    if (!list.length) {
      grid.innerHTML = `
        <div class="no-results">
          <div class="no-results-icon">🔍</div>
          <h3 style="font-family:var(--font-display);color:var(--gray-700);margin-bottom:0.5rem;">No products found</h3>
          <p style="font-size:0.9rem;">Try a different search term or category.</p>
          <button onclick="clearFilters()" class="btn btn-primary" style="margin-top:1rem;">Clear Filters</button>
        </div>`;
      return;
    }

    grid.innerHTML = list.map(p => {
      const id      = p._id || p.id;
      const imgSrc  = p.image
        ? (p.image.startsWith('http') ? p.image : `${API.replace('/api','')}/uploads/${p.image}`)
        : (localImgs[p.name] || null);
      const emoji   = catEmoji[p.category] || '🌿';
      const isAvail = p.isAvailable !== false;

      return `
        <a href="product-detail.html?id=${id}" class="product-card">
          <div class="product-card-img">
            ${imgSrc
              ? `<img src="${imgSrc}" alt="${p.name}" loading="lazy" />`
              : `<span class="img-emoji">${emoji}</span>`}
            ${p.isFeatured
              ? `<div class="product-card-badge"><span class="badge badge-gold">Featured</span></div>`
              : ''}
            ${!isAvail
              ? `<div style="position:absolute;inset:0;background:rgba(255,255,255,0.75);display:flex;align-items:center;justify-content:center;"><span class="status-pill pill-gray">Out of Stock</span></div>`
              : ''}
          </div>
          <div class="product-card-body">
            <div class="product-card-cat">${p.category}</div>
            <div class="product-card-name">${p.name}</div>
            <div class="product-card-co">${p.company || '—'}</div>
            <div class="product-card-foot">
              <div class="product-card-price">
                ₹${(p.price || 0).toLocaleString('en-IN')}
                <span>/ ${p.unit || 'unit'}</span>
              </div>
              <span class="btn-view-card">View</span>
            </div>
          </div>
        </a>`;
    }).join('');
  }

  function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('sortSelect').value  = 'default';
    document.querySelectorAll('.cat-pill').forEach((p, i) => p.classList.toggle('active', i === 0));
    activeCategory = 'all';
    applyFilters();
  }

  // Update nav login button if user is logged in
  function updateNav() {
    const user = JSON.parse(localStorage.getItem('kc_user') || 'null');
    if (user) {
      const btn = document.getElementById('navLoginBtn');
      if (btn) {
        btn.textContent = user.name.split(' ')[0];
        btn.href = 'profile.html';
      }
    }
  }

  function demoProducts() {
    return [
      { _id:'1', name:'NPK 19:19:19',   company:'Jai Kisaan',        category:'Water Soluble Fertilizers', price:200,  unit:'kg',      isFeatured:true,  isAvailable:true },
      { _id:'2', name:'Cannon',          company:'NACL Industries',   category:'Insecticides',              price:700,  unit:'ltr',     isFeatured:false, isAvailable:true },
      { _id:'3', name:'Coragen',         company:'FMC',               category:'Pesticides',                price:2250, unit:'ltr',     isFeatured:true,  isAvailable:true },
      { _id:'4', name:'Coriander Seeds', company:'Ashoka',            category:'Seeds',                     price:425,  unit:'kg',      isFeatured:false, isAvailable:true },
      { _id:'5', name:'Urea 45kg',       company:'IFFCO',             category:'Water Soluble Fertilizers', price:400,  unit:'bag',     isFeatured:false, isAvailable:true },
      { _id:'6', name:'Glyphosate 41%',  company:'Monsanto',          category:'Herbicides',                price:320,  unit:'ltr',     isFeatured:false, isAvailable:true },
      { _id:'7', name:'Chlorpyrifos 20%',company:'Bayer',             category:'Insecticides',              price:550,  unit:'ltr',     isFeatured:false, isAvailable:true },
      { _id:'8', name:'Onion Seeds',     company:'Mahyco',            category:'Seeds',                     price:600,  unit:'packet',  isFeatured:false, isAvailable:true },
      { _id:'9', name:'Tata Rallis M45', company:'Tata Chemicals',    category:'Pesticides',                price:280,  unit:'kg',      isFeatured:false, isAvailable:false },
      { _id:'10',name:'Atrazine 50%',    company:'UPL',               category:'Herbicides',                price:240,  unit:'kg',      isFeatured:false, isAvailable:true },
      { _id:'11',name:'DAP Fertilizer',  company:'IFFCO',             category:'Water Soluble Fertilizers', price:1350, unit:'bag',     isFeatured:false, isAvailable:true },
      { _id:'12',name:'Wheat Seeds',     company:'National Seeds',    category:'Seeds',                     price:480,  unit:'kg',      isFeatured:false, isAvailable:true },
    ];
  }

  updateNav();
  loadProducts();
</script>

</body>
</html>
